name: Update RSS

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"

      - run: mkdir -p docs

      - run: go run cmd/lobster/main.go > docs/lobsters.xml

      - run: go run cmd/hn/main.go > docs/hn.xml

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Lobsters feed
