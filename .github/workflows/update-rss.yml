name: Update RSS

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Generate RSS feeds
        run: |
          mkdir -p docs
          go run ./cmd/lobster > docs/lobsters.xml
          go run ./cmd/hn > docs/hn.xml

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update Lobsters feed
